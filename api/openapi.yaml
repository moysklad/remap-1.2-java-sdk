openapi: 3.0.3
info:
  description: "API для манипуляции с сущностями и создания отчетов в онлайн-серви\
    се МойСклад.\n\n## Аутентификация\n\nМойСклад поддерживает аутентификацию по п\
    ротоколу Basic Auth и с использованием токена доступа:\n- Basic Auth: заголово\
    к `Authorization` со значением пары `логин:пароль`, закодированным в Base64\n\
    - Bearer Token: заголовок `Authorization` со значением `Bearer <Access-Token>`\n\
    \n## Ограничения\n\n- Не более 45 запросов за 3 секундный период от аккаунта\n\
    - Не более 5 параллельных запросов от одного пользователя  \n- Не более 20 пар\
    аллельных запросов от аккаунта\n- Не более 20 Мб данных в одном запросе\n- Мак\
    симум 1000 элементов в массиве\n- Обязательное использование сжатия gzip\n"
  license:
    name: Apache 2.0
    url: https://www.apache.org
  title: МойСклад JSON API
  version: 1.0.0
servers:
- description: Production server
  url: https://api.moysklad.ru/api/remap/1.2
security:
- basicAuth: []
- bearerAuth: []
tags:
- description: Операции с товарами
  name: Products
- description: Операции с группами
  name: Groups
- description: Операции со странами
  name: Countries
- description: Операции с группами товаров
  name: ProductFolders
- description: Операции с единицами измерений
  name: Uoms
- description: Операции с валютами
  name: Currencies
- description: Операции с сотрудниками
  name: Employees
- description: Операции с договорами
  name: Contracts
- description: Операции с контрагентами
  name: Counterparties
- description: Операции с услугами
  name: Services
- description: Операции с типами цен
  name: PriceTypes
- description: Операции с точками продаж
  name: RetailStores
- description: Операции с кассирами
  name: Cashiers
- description: Операции c Внутренними заказами
  name: InternalOrders
- description: Операции с комплектами
  name: Bundles
- description: Операции с модификациями
  name: Variants
- description: Операции с серийными номерами
  name: Things
- description: Операции со складами
  name: Stores
- description: Операции с заказами покупателя
  name: CustomerOrders
- description: Операции с заказами поставщика
  name: PurchaseOrders
- description: Операции с приходными ордерами
  name: CashIns
- description: Операции с расходными ордерами
  name: CashOuts
- description: Операции с полученными отчетами комиссионера
  name: CommissionReportIns
- description: Операции с настройками компании
  name: CompanySettings
- description: Операции со скидками
  name: Discounts
- description: Операции с ассортиментом
  name: Assortment
- description: Операции с бонусными программами
