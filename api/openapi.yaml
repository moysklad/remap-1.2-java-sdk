          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
          description: Успешный запрос
        default:
          $ref: "#/components/responses/CommonError"
      summary: Получить договор по ID
      tags:
      - Contracts
      x-accepts:
      - application/json
      - text/html;charset=UTF-8
    put:
      description: Обновление договора с указанным id
      operationId: updateContract
      parameters:
      - description: ID сущности
        in: path
        name: id
        required: true
        schema:
          example: 12a8b923-692c-11e6-8a84-bae500000053
          format: uuid
          type: string
      - description: Замена ссылок объектами с помощью expand
        example: "agent,organization"
        in: query
        name: expand
        schema:
          type: string
      - in: header
        name: accept
        required: false
        schema:
          default: application/json;charset=utf-8
          enum:
          - application/json
          - application/json;charset=utf-8
          type: string
      - in: header
        name: Accept-Encoding
        required: false
        schema:
          default: "gzip, deflate, br"
          example: "gzip, deflate, br"
          type: string
      - in: header
        name: Content-Type
        required: false
        schema:
          default: application/json
          enum:
          - application/json
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Contract"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
          description: Договор успешно обновлен
        default:
          $ref: "#/components/responses/CommonError"
      summary: Обновить договор
      tags:
