components:
  parameters:
    limit:
      description: Максимальное количество элементов в выданном списке (максимум 1000)
      in: query
      name: limit
      schema:
        default: 1000
        maximum: 1000
        minimum: 1
        type: integer
    offset:
      description: Отступ в выданном списке
      in: query
      name: offset
      schema:
        default: 0
        minimum: 0
        type: integer
    search:
      description: Контекстный поиск по строковым полям сущностей
      in: query
      name: search
      schema:
        example: name=123
        type: string
    filter:
      description: Фильтрация выборки
      example: archived=false
      in: query
      name: filter
      schema:
        type: string
    expand:
      description: Замена ссылок объектами с помощью expand
      example: "agent,organization"
      in: query
      name: expand
      schema:
        type: string
    order:
      description: Сортировка
      example: name
      in: query
      name: order
      schema:
        type: string
    AcceptHeader:
      in: header
      name: accept
      required: false
      schema:
        default: application/json;charset=utf-8
        enum:
        - application/json
        - application/json;charset=utf-8
        type: string
    AcceptEncoding:
      in: header
      name: Accept-Encoding
      required: false
      schema:
        default: "gzip, deflate, br"
        example: "gzip, deflate, br"
        type: string
    ContentTypeJson:
      in: header
      name: Content-Type
      required: false
      schema:
        default: application/json
        enum:
        - application/json
        type: string
    entityId:
      description: ID сущности
      in: path
      name: id
      required: true
      schema:
        example: 12a8b923-692c-11e6-8a84-bae500000053
        format: uuid
        type: string
    fields:
      description: |
        Включить в ответ скрытые поля, не выводимые по умолчанию.
        В одном запросе можно передать только одно значение.
        - `minimumStock` — неснижаемый остаток (товар, модификация)
        - `downloadPermanentHref` — постоянная ссылка на изображение (платный тариф)
        - `stock` — остатки и себестоимость в позициях документов
        - `declaration` — прослеживаемость импортных товаров в позициях документов
      example: minimumStock
      in: query
      name: fields
      schema:
        enum:
        - minimumStock
        - downloadPermanentHref
        - stock
        - declaration
        type: string
    positionId:
      description: ID позиции
      in: path
      name: positionId
      required: true
      schema:
        example: 12a8b923-692c-11e6-8a84-bae500000054
        format: uuid
        type: string
  responses:
    CommonError:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/errorOrArray"
        text/html;charset=UTF-8:
          schema:
            example: <html><head><title>Error</title></head><body>Bad Request</body></html>
            type: string
      description: Ошибка запроса (тело — объект или массив объектов с полем errors)
    NotFoundEmpty:
      description: Запрошенный ресурс не существует (тело ответа отсутствует)
    BadRequest:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
        text/html;charset=UTF-8:
          schema:
            example: <html><head><title>Error</title></head><body>Bad Request</body></html>
            type: string
      description: Ошибка в структуре JSON передаваемого запроса
    Unauthorized:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
      description: Имя и/или пароль пользователя указаны неверно или заблокированы
    Forbidden:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
      description: У вас нет прав на просмотр данного объекта
    MethodNotAllowed:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
      description: Метод не поддерживается для данного ресурса
      headers:
        Allow:
          description: Список поддерживаемых HTTP методов (может отсутствовать в ответах
            от nginx)
          required: false
          schema:
            example: "GET, POST, PUT, DELETE"
            type: string
    UnsupportedMediaType:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
        text/html;charset=UTF-8:
          schema:
            example: <html><head><title>415 Unsupported Media Type</title></head><body><center><h1>415
              Unsupported Media Type</h1></center></body></html>
            type: string
      description: Неподдерживаемый тип содержимого (Content-Type)
  schemas:
    Account:
      description: Счета контрагентов/юрлиц
      properties:
        meta:
          $ref: "#/components/schemas/Meta"
        id:
          description: ID счета
          format: uuid
          readOnly: true
          type: string
        accountId:
          description: ID учетной записи
          format: uuid
          readOnly: true
          type: string
        updated:
          description: Время последнего изменения
          readOnly: true
          type: string
        isDefault:
          description: Основной счет
          example: false
          type: boolean
        accountNumber:
          description: Номер счета
          example: "40702810123456789012"
          type: string
        bankName:
          description: Наименование банка
          example: ПАО Сбербанк
          type: string
        bankLocation:
          description: Адрес банка
          type: string
        correspondentAccount:
          description: Корр. счет
          example: "30101810400000000225"
          type: string
        bic:
          description: БИК
          example: "044525225"
          type: string
        currency:
          allOf:
          - $ref: "#/components/schemas/Currency_1"
