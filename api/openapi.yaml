          - application/json
          type: string
      requestBody:
        content:
          application/json:
            schema:
              items:
                $ref: "#/components/schemas/Contract"
              maxItems: 1000
              minItems: 1
              type: array
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/deleteContractsBatch_200_response_inner"
                type: array
          description: Результат по каждому элементу (успех или объект ошибки)
        default:
          $ref: "#/components/responses/CommonError"
      summary: Удалить договоры
      tags:
      - Contracts
      x-content-type: application/json
      x-accepts:
      - application/json
      - text/html;charset=UTF-8
  /entity/contract/batch:
