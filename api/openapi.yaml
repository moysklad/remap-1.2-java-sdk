paths:
  /entity/contract:
    get:
      description: Запрос всех договоров на данной учетной записи
      operationId: getContracts
      parameters:
      - description: Максимальное количество элементов в выданном списке (максимум
          1000)
        in: query
        name: limit
        schema:
          default: 1000
          maximum: 1000
          minimum: 1
          type: integer
      - description: Отступ в выданном списке
        in: query
        name: offset
        schema:
          default: 0
          minimum: 0
          type: integer
      - description: Контекстный поиск по строковым полям сущностей
        in: query
        name: search
        schema:
          example: name=123
          type: string
      - description: Фильтрация выборки
        example: archived=false
        in: query
        name: filter
        schema:
          type: string
      - description: Замена ссылок объектами с помощью expand
        example: "agent,organization"
        in: query
        name: expand
        schema:
          type: string
      - description: Сортировка
        example: name
        in: query
        name: order
        schema:
          type: string
      - in: header
        name: accept
        required: false
        schema:
          default: application/json;charset=utf-8
          enum:
          - application/json
          - application/json;charset=utf-8
          type: string
      - in: header
        name: Accept-Encoding
        required: false
        schema:
          default: "gzip, deflate, br"
          example: "gzip, deflate, br"
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractList"
          description: Успешный запрос
        default:
          $ref: "#/components/responses/CommonError"
      summary: Получить список договоров
      tags:
      - Contracts
      x-accepts:
      - application/json
      - text/html;charset=UTF-8
    post:
      description: Создание нового договора
      operationId: createContract
      parameters:
      - description: Замена ссылок объектами с помощью expand
        example: "agent,organization"
        in: query
        name: expand
        schema:
          type: string
      - in: header
        name: accept
        required: false
        schema:
          default: application/json;charset=utf-8
          enum:
          - application/json
          - application/json;charset=utf-8
          type: string
      - in: header
        name: Accept-Encoding
        required: false
        schema:
          default: "gzip, deflate, br"
          example: "gzip, deflate, br"
          type: string
      - in: header
        name: Content-Type
        required: false
        schema:
          default: application/json
          enum:
          - application/json
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Contract"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
          description: Договор успешно создан
        default:
          $ref: "#/components/responses/CommonError"
      summary: Создать договор
      tags:
      - Contracts
      x-content-type: application/json
      x-accepts:
      - application/json
      - text/html;charset=UTF-8
  /entity/contract/{id}:
