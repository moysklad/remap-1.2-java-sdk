    DiscountList_rows_inner:
      anyOf:
      - $ref: "#/components/schemas/Discount_1"
      - $ref: "#/components/schemas/PersonalDiscount_1"
      - $ref: "#/components/schemas/SpecialPriceDiscount_1"
      - $ref: "#/components/schemas/AccumulationDiscount_1"
      - $ref: "#/components/schemas/BonusProgram_1"
      description: |
        Логический вид строки в JSON задаётся `meta.type` (см. описание массива `rows` выше).

        Здесь `anyOf`, а не `oneOf`: у вариантов общий базис (`DiscountBase`), минимальный объект
        одновременно удовлетворяет нескольким веткам, и строгие валидаторы (в т.ч. Schemathesis)
        падают с ошибкой «валидно более чем по одной схеме `oneOf`».

        Сгенерированный PHP SDK для такого `items` обычно выдаёт один **объединённый** тип строки
        (все поля вариантов в одной модели), а не `Discount` / `PersonalDiscount` на элемент.
        Отображение в доменные классы по `meta.type` — ответственность приложения (ручной разбор
        или повторный decode в нужную модель).
